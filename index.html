<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 Tarot Tiên Tri</title>
    <link rel="stylesheet" href="style.css?v=2.0">
</head>
<body>
    <div class="container">
        <button id="themeBtn" class="btn-theme">🌙 Đổi Theme</button>
        <h1>🔮 Tarot Tiên Tri</h1>
        
        <input type="text" id="nameInput" placeholder="Tên của bạn">
        <input type="date" id="dobInput">
        <input type="number" id="luckyNumInput" placeholder="Số may mắn (1-9)" min="1" max="9">
        
        <button id="xemBoiBtn">Xem bài Tarot</button>
        
        <div id="card-area">
            <div id="card-container">
                <img id="card-img" src="back.jpg" alt="Lá bài">
            </div>
        </div>
        
        <h2 id="result" class="fade-in"></h2>
    </div>
    <script src="script.js?v=2.0"></script>
</body>
</html>
