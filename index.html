<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Xem Bói Vui</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button id="themeBtn" class="btn-theme">🌙 Đổi Theme</button>
        
        <h1>🔮 Xem Bói Vận Mệnh</h1>
        <input type="text" id="nameInput" placeholder="Nhập tên người cần bói">
        <button id="xemBoiBtn">Xem kết quả</button>
        
        <h2 id="result" class="fade-in"></h2>

        <div id="history-section">
            <h3>Lịch sử bói:</h3>
            <ul id="historyList"></ul>
            <button onclick="clearHistory()" class="btn-clear">Xóa lịch sử</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
